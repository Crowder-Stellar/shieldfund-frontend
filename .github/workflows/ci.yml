name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, test, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Run tests
        run: npm run test
        env:
          VITE_STELLAR_NETWORK: TESTNET
          VITE_TREASURY_VAULT_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABSC4
          VITE_STREAMING_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABSC4
          VITE_PROOF_REGISTRY_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABSC4

      - name: Build
        run: npm run build
        env:
          VITE_STELLAR_NETWORK: TESTNET
          VITE_TREASURY_VAULT_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABSC4
          VITE_STREAMING_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABSC4
          VITE_PROOF_REGISTRY_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABSC4

  deploy-preview:
    name: Deploy to Vercel (preview)
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          VITE_STELLAR_NETWORK: ${{ secrets.VITE_STELLAR_NETWORK }}
          VITE_TREASURY_VAULT_CONTRACT_ID: ${{ secrets.VITE_TREASURY_VAULT_CONTRACT_ID }}
          VITE_STREAMING_CONTRACT_ID: ${{ secrets.VITE_STREAMING_CONTRACT_ID }}
          VITE_PROOF_REGISTRY_CONTRACT_ID: ${{ secrets.VITE_PROOF_REGISTRY_CONTRACT_ID }}
      - name: Deploy preview to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./

  deploy-production:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          VITE_STELLAR_NETWORK: ${{ secrets.VITE_STELLAR_NETWORK }}
          VITE_TREASURY_VAULT_CONTRACT_ID: ${{ secrets.VITE_TREASURY_VAULT_CONTRACT_ID }}
          VITE_STREAMING_CONTRACT_ID: ${{ secrets.VITE_STREAMING_CONTRACT_ID }}
          VITE_PROOF_REGISTRY_CONTRACT_ID: ${{ secrets.VITE_PROOF_REGISTRY_CONTRACT_ID }}
      - name: Deploy production to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
